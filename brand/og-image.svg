<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%" cy="32%" r="90%">
      <stop offset="0%" stop-color="#1b2540"/>
      <stop offset="55%" stop-color="#0e1322"/>
      <stop offset="100%" stop-color="#0b0e14"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- фоновые гексы -->
  <g fill="none" stroke="#f59e0b" stroke-opacity="0.06" stroke-width="2">
    <polygon points="100,470 150,500 150,560 100,590 50,560 50,500"/>
    <polygon points="1100,50 1150,80 1150,140 1100,170 1050,140 1050,80"/>
  </g>

  <!-- ЛОГО -->
  <g transform="translate(140,315) scale(0.72)" filter="url(#glow)">
    <polygon points="0,-148 122,-76 122,76 0,148 -122,76 -122,-76"
             fill="none" stroke="url(#amber)" stroke-width="16" stroke-linejoin="round"/>
    <polygon points="0,-76 64,0 0,76 -64,0" fill="#0e1322" stroke="url(#amber)" stroke-width="13" stroke-linejoin="round"/>
    <line x1="0" y1="-44" x2="0" y2="44" stroke="#ffd166" stroke-width="13" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="11" fill="#fde68a"/>
  </g>

  <!-- ТЕКСТ -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="300" y="285" font-size="62" font-weight="800" fill="#e6ecf5" letter-spacing="1">CRYPTO RELIC <tspan fill="#f59e0b">DAY</tspan></text>
    <text x="303" y="345" font-size="30" font-weight="600" fill="#ffd166">One block. One day. One drop. No rerolls.</text>
    <text x="303" y="388" font-size="21" fill="#8592a8">Daily collectible sealed by a real Bitcoin block · provably fair</text>
  </g>

  <!-- ВЕЕР КАРТОЧЕК (правый нижний угол) -->
  <g transform="translate(880,480) rotate(-8) scale(0.8)">
    <rect x="-60" y="-85" width="120" height="170" rx="12" fill="#151c2c" stroke="#38bdf8" stroke-width="3"/>
    <polygon points="0,-38 26,-6 0,26 -26,-6" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linejoin="round"/>
    <rect x="-38" y="44" width="76" height="8" rx="4" fill="#38bdf8" opacity="0.5"/>
  </g>
  <g transform="translate(985,495) rotate(0) scale(0.8)" filter="url(#softglow)">
    <rect x="-60" y="-85" width="120" height="170" rx="12" fill="#151c2c" stroke="#a855f7" stroke-width="3"/>
    <polygon points="0,-38 26,-6 0,26 -26,-6" fill="none" stroke="#a855f7" stroke-width="5" stroke-linejoin="round"/>
    <rect x="-38" y="44" width="76" height="8" rx="4" fill="#a855f7" opacity="0.5"/>
  </g>
  <g transform="translate(1095,505) rotate(9) scale(0.85)" filter="url(#glow)">
    <rect x="-66" y="-94" width="132" height="188" rx="13" fill="#171226" stroke="url(#amber)" stroke-width="4"/>
    <polygon points="0,-42 29,-7 0,28 -29,-7" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linejoin="round"/>
    <line x1="0" y1="-27" x2="0" y2="13" stroke="#ffd166" stroke-width="6" stroke-linecap="round"/>
    <rect x="-42" y="48" width="84" height="9" rx="4.5" fill="#f59e0b" opacity="0.7"/>
  </g>

  <!-- хеш внизу -->
  <text x="600" y="600" font-family="Consolas, Courier New, monospace" font-size="19" fill="#8592a8" opacity="0.4" text-anchor="middle" letter-spacing="2">check what today's block gives you · cryptorelicday.github.io/crypto-relic</text>
</svg>
